stages:
  - mirror

mirror-github:
  stage: mirror
  tags:
    - vps
  only:
    - master
  variables:
    GIT_STRATEGY: clone
  script:
    - git config user.email "ci@treetank.net"
    - git config user.name "treetank CI"
    - git checkout master
    - |
      NOTICE='> **Mirror**: This is a read-only mirror of [gitlab.com/treetank/hooker](https://gitlab.com/treetank/hooker). Active development happens there.'
      if ! head -1 README.md | grep -q "Mirror"; then
        printf '%s\n\n' "$NOTICE" | cat - README.md > README.tmp && mv README.tmp README.md
        git add README.md
        git commit -m "Add GitHub mirror notice [skip ci]"
      fi
    - git push --force "https://${GITHUB_TOKEN}@github.com/jmarianski/hooker.git" master
    - git push --force --tags "https://${GITHUB_TOKEN}@github.com/jmarianski/hooker.git"
