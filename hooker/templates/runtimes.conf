# Hooker runtime configuration
# Maps file extensions to commands that execute them.
# Place in: .claude/hooker/runtimes.conf (project) or ~/.claude/hooker/runtimes.conf (user)
# Environment override: HOOKER_RUNTIME_<ext>=command (highest priority)
#
# Format: extension=command
# Empty value = execute directly (compiled binary, self-executing script)
#
# Built-in defaults (used when no override is set):
#   sh=bash
#   py=python3
#   js=node
#   ts=npx tsx
#   go=go run
#   php=php
#   rb=ruby
#   pl=perl
#
# Examples:
#   ts=deno run --allow-read --allow-env
#   ts=bun run
#   py=docker run --rm -i python:3.12 python3
#   js=bun run
#   go=go run
#   bin=
#   exe=
