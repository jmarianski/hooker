# Overflow hooks — events known to CC but not in plugin hooks.json
# (because older CC versions reject the entire hooks.json on unknown events)
#
# Format: min_version=event1,event2,...
# Hook entries are added to ~/.claude/settings.json on first session message.
# Only added if CC version >= min_version.

2.1.69=InstructionsLoaded
2.1.78=StopFailure,PostCompact
2.1.83=CwdChanged,FileChanged
2.1.84=TaskCreated
2.1.89=PermissionDenied
