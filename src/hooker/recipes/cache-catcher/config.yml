# Cache Catcher Configuration
#
# mode: what to do when cache anomaly detected
#   "warn"  — inject warning, agent keeps working
#   "block" — block tool use (deny), forces agent to stop
mode: warn

# lookback: how many recent assistant turns to analyze
lookback: 3

# threshold: minimum cache_creation / cache_read ratio to trigger
# 1.0 means creation >= read, 0.5 means creation >= 50% of read
threshold: 1.0

# min_tokens: ignore turns where cache_creation is below this
# (small writes are normal for incremental context growth)
min_tokens: 5000

# streak: how many consecutive bad turns before triggering
# 1 = trigger on first observation, 2 = need two in a row, etc.
streak: 1

# cooldown: minimum seconds between warnings (prevents spam)
cooldown: 60

# ignore_first_turn: skip the very first turn (always has high creation)
ignore_first_turn: true

# prompt_aliases: optional extra UserPromptSubmit command prefixes (comma-separated).
# "cache-catcher" is always recognized; add e.g. cc so both "cc status" and "cache-catcher status" work.
# Allowed characters per prefix: letters, digits, ._-
prompt_aliases: ""

# --- Resume guard ---
# Blocks the first prompt after resume when cache is likely cold.

# resume_guard: enable/disable resume guard
resume_guard: true

# cache_ttl_default: assumed cache TTL in minutes (adapts automatically)
# Set to 60 for conservative (warn after 1h idle), 5 for paranoid.
cache_ttl_default: 60

# cache_ttl_min: minimum TTL to learn down to (minutes)
# Set after detecting bad cache on a short resume.
cache_ttl_min: 5

# resume_guard_force_ttl: if true, use TTL check even on known-broken versions.
# Useful once CC >= 2.1.93+ fixes the resume bug and you want to opt in early.
resume_guard_force_ttl: false
