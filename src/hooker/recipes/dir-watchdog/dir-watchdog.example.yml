# Directory Watchdog configuration
# Place as .claude/hooker/dir-watchdog.yml in your project

# Default threshold for unconfigured directories (0 = don't scan unconfigured)
default_threshold: 30

# How often to check (1 = every message, 5 = every ~5th message)
check_frequency: 5

# Global ignore patterns — these files are never counted or deleted
# Supports filename globs: *.keep, README.*, .gitkeep
ignore: [.gitkeep, README.md, .keep]

# Rules for specific directories
rules:
  - path: screenshots/
    max_files: 30
    extensions: [png, jpg, jpeg, webp, gif, bmp]
    action: cleanup    # cleanup = delete oldest beyond threshold
    # Per-rule ignore — these files are never counted or deleted
    # ignore: [baseline_*.png, reference.png]

  - path: logs/
    max_files: 50
    extensions: [log, txt]
    action: warn       # warn = inject suggestion, don't delete
    ignore: [current.log]

  - path: tmp/
    max_files: 20
    action: cleanup    # no extensions filter = all files

  # - path: recordings/
  #   max_files: 10
  #   extensions: [mp4, webm, mov]
  #   action: cleanup
  #   ignore: [demo.mp4]
